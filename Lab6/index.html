    <h1 style="padding-top: 80px; text-align: center;">Car Details</h1>

    <p style="text-align: center;">Click a button to load car details</p>

    <div class="text-center">
        <button id="mercedesButton" class="btn btn-primary" style="margin: 10px;" onclick="loadCar('mercedes.json')">Mercedes</button>
        <button id="ferrariButton" class="btn btn-primary" style="margin: 10px;" onclick="loadCar('ferrari.json')">Fictional Ferrari</button>
        <button id="clearButton" class="btn btn-primary" style="margin: 10px;" onclick="clearGrid()">Clear</button>
    </div>

    <!-- Equal width cols, same on all screen sizes -->
    <div class="container">
        <div class="row" id="row1">
            <div class="col my-col" id="name-col">
                CAR NAME
            </div>
            <div class="col my-col" id="year-col">
                YEAR
            </div>
        </div>

        <div class="row" id="row2">
            <div class="col my-col" id="engine-type-col">
                ENGINE TYPE
            </div>
            <div class="col my-col" id="engine-size-col">
                ENGINE SIZE
            </div>
            <div class="col my-col" id="engine-config-col">
                ENGINE CONFIG
            </div>
        </div>
    </div>

    <img src="no_car.png" id="car-image" style="display: block; margin: 20px auto; height: 400px; width: auto; " alt="Car Image">
